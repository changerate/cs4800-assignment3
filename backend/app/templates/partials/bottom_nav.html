<nav class="bottom-nav" aria-label="Primary">
  <a
    href="{{ url_for('web.index') }}"
    class="bottom-nav-link {% if page == 'home' %}is-active{% endif %}"
    ><i class="bi bi-house-door" aria-hidden="true"></i><span>Home</span></a
  >
  <a
    href="{{ url_for('web.saved') }}"
    class="bottom-nav-link {% if page == 'saved' %}is-active{% endif %}"
    ><i class="bi bi-bookmark-heart" aria-hidden="true"></i><span>Saved</span></a
  >
  {% if is_authenticated %}
  <a
    href="{{ url_for('web.profile') }}"
    class="bottom-nav-link {% if page == 'profile' %}is-active{% endif %}"
    ><i class="bi bi-person-circle" aria-hidden="true"></i><span>Profile</span></a
  >
  {% else %}
  <a
    href="{{ url_for('web.auth_page') }}"
    class="bottom-nav-link {% if page == 'auth' %}is-active{% endif %}"
    ><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span>Login</span></a
  >
  {% endif %}
</nav>
