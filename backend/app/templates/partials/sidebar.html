<aside class="sidebar" aria-label="Site">
  <div class="sidebar-brand">
    <a href="{{ url_for('web.index') }}" class="sidebar-brand-link">Paper View</a>
    <p class="sidebar-tagline">Papers worth your attention</p>
  </div>

  <nav class="sidebar-nav" aria-label="Primary">
    <a
      href="{{ url_for('web.index') }}"
      class="sidebar-link {% if page == 'home' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-house-door" aria-hidden="true"></i><span>Home</span></span></a
    >
    <a
      href="{{ url_for('web.saved') }}"
      class="sidebar-link {% if page == 'saved' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-bookmark-heart" aria-hidden="true"></i>Saved</span></a
    >
    {% if is_authenticated %}
    <a
      href="{{ url_for('web.profile') }}"
      class="sidebar-link {% if page == 'profile' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-person-circle" aria-hidden="true"></i><span>Profile</span></span></a
    >
    {% else %}
    <a
      href="{{ url_for('web.auth_page') }}"
      class="sidebar-link {% if page == 'auth' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span>Signup/Login</span></span></a
    >
    {% endif %}
  </nav>

  {% if page == 'home' %}
  {% with heading_id="filter-heading" %}{% include "partials/topic_filters.html" %}{% endwith %}
  {% endif %}
</aside>
