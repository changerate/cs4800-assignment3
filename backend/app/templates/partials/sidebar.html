<aside class="sidebar" aria-label="Site">
  <div class="sidebar-brand">
    <a href="{{ url_for('web.index') }}" class="sidebar-brand-link">Campus Research</a>
    <p class="sidebar-tagline">Papers worth your attention</p>
  </div>

  <nav class="sidebar-nav" aria-label="Primary">
    <a
      href="{{ url_for('web.index') }}"
      class="sidebar-link {% if page == 'home' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-house-door" aria-hidden="true"></i><span>Home</span></span></a
    >
    <a
      href="{{ url_for('web.saved') }}"
      class="sidebar-link {% if page == 'saved' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-bookmark-heart" aria-hidden="true"></i>Saved</span></a
    >
    <a
      href="{{ url_for('web.discover') }}"
      class="sidebar-link {% if page == 'discover' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-search" aria-hidden="true"></i><span>Discover</span></span></a
    >
    {% if is_authenticated %}
    <a
      href="{{ url_for('web.profile') }}"
      class="sidebar-link {% if page == 'profile' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-person-circle" aria-hidden="true"></i><span>Profile</span></span></a
    >
    {% else %}
    <a
      href="{{ url_for('web.auth_page') }}"
      class="sidebar-link {% if page == 'auth' %}is-active{% endif %}"
      ><span class="icon-label"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span>Signup/Login</span></span></a
    >
    {% endif %}
  </nav>

  <section class="sidebar-filters" aria-labelledby="filter-heading">
    <h2 id="filter-heading" class="sidebar-heading">
      <span class="icon-label"><i class="bi bi-funnel" aria-hidden="true"></i><span>Research interests</span></span>
    </h2>
    <ul class="filter-list">
      <li>
        <a
          href="{{ url_for('web.index') }}"
          class="filter-pill {% if not active_topic %}is-active{% endif %}"
          ><span class="icon-label"><i class="bi bi-grid-3x3-gap" aria-hidden="true"></i><span>All topics</span></span></a
        >
      </li>
      {% for topic in topics %}
      <li>
        <a
          href="{{ url_for('web.index', topic=topic) }}"
          class="filter-pill {% if active_topic == topic %}is-active{% endif %}"
          >{{ topic }}</a
        >
      </li>
      {% endfor %}
    </ul>
  </section>
</aside>
