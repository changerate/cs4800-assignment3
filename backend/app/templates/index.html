{% extends "base.html" %}
{% block title %}Grid Social{% endblock %}
{% block body %}
<div class="app-shell">
  <header class="top-bar">
    <div class="brand">Grid<span>Social</span></div>
    <div id="auth-root">
      <div class="auth-panel" id="guest-auth">
        <label class="field"
          >Username
          <input id="reg-username" name="username" autocomplete="username" />
        </label>
        <label class="field"
          >Email
          <input id="reg-email" name="email" autocomplete="email" />
        </label>
        <label class="field"
          >Password
          <input
            id="reg-password"
            type="password"
            name="password"
            autocomplete="new-password"
          />
        </label>
        <button class="btn primary" type="button" id="btn-register">
          Register
        </button>
        <label class="field"
          >Login
          <input id="login-username" autocomplete="username" />
        </label>
        <label class="field"
          >&nbsp;
          <input
            id="login-password"
            type="password"
            autocomplete="current-password"
          />
        </label>
        <button class="btn" type="button" id="btn-login">Sign in</button>
      </div>
      <div class="user-strip" id="user-auth" hidden>
        <span id="user-label"></span>
        <span class="pill" id="vehicle-pill">No vehicle</span>
        <button class="btn ghost" type="button" id="btn-logout">Log out</button>
      </div>
    </div>
  </header>

  <div class="flash" id="flash" aria-live="polite"></div>

  <div class="layout">
    <main class="panel">
      <h2>Feed grid</h2>
      <div class="toolbar">
        <label class="field"
          >Your vehicle
          <select id="vehicle-select" disabled>
            <option value="">Loading…</option>
          </select>
        </label>
        <button class="btn" type="button" id="btn-refresh" disabled>
          Refresh now
        </button>
        <span class="status-line" id="poll-status"></span>
      </div>
      <div class="post-grid" id="post-grid"></div>
      <section class="compose" id="compose" hidden>
        <h2 style="margin: 0; font-size: 1rem; color: var(--muted)">
          Quick share
        </h2>
        <label class="field"
          >Title
          <input id="post-title" maxlength="200" />
        </label>
        <label class="field"
          >Body (optional)
          <textarea id="post-body"></textarea>
        </label>
        <button class="btn primary" type="button" id="btn-post">Post</button>
      </section>
    </main>
    <aside class="panel">
      <h2>Live activity</h2>
      <ul class="activity-list" id="activity-list"></ul>
    </aside>
  </div>
</div>

<div class="modal-backdrop" id="post-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <header>
      <h3 id="modal-title"></h3>
      <button class="btn ghost" type="button" id="modal-close">Close</button>
    </header>
    <p id="modal-meta" style="color: var(--muted); font-size: 0.85rem"></p>
    <div id="modal-body" style="white-space: pre-wrap"></div>
  </div>
</div>

<script>
  (function () {
    const $ = (id) => document.getElementById(id);
    const flash = $("flash");
    const guestAuth = $("guest-auth");
    const userAuth = $("user-auth");
    const compose = $("compose");
    const vehicleSelect = $("vehicle-select");
    const pollStatus = $("poll-status");
    const postGrid = $("post-grid");
    const activityList = $("activity-list");
    const modal = $("post-modal");

    async function api(path, opts = {}) {
      const method = (opts.method || "GET").toUpperCase();
      const headers = { Accept: "application/json", ...(opts.headers || {}) };
      if (method !== "GET" && method !== "HEAD" && opts.body != null) {
        headers["Content-Type"] = "application/json";
      }
      const res = await fetch(path, {
        credentials: "same-origin",
        ...opts,
        headers,
      });
      let data = null;
      try {
        data = await res.json();
      } catch (_) {
        data = null;
      }
      if (!res.ok) {
        const msg = (data && data.error) || res.statusText || "Request failed";
        throw new Error(msg);
      }
      return data;
    }

    function setFlash(msg) {
      flash.textContent = msg || "";
    }

    let pollTimer = null;
    const POLL_MS = 8000;

    function fmtTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString();
    }

    async function refreshVehicles(selectedId) {
      const data = await api("/api/v1/vehicles");
      vehicleSelect.innerHTML = "";
      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "Choose a vehicle…";
      vehicleSelect.appendChild(blank);
      for (const v of data.vehicles || []) {
        const opt = document.createElement("option");
        opt.value = String(v.id);
        opt.textContent = v.name;
        vehicleSelect.appendChild(opt);
      }
      vehicleSelect.disabled = false;
      if (selectedId != null) {
        vehicleSelect.value = String(selectedId);
      } else {
        vehicleSelect.value = "";
      }
    }

    function renderPosts(posts) {
      postGrid.innerHTML = "";
      if (!posts || !posts.length) {
        const hint = document.createElement("div");
        hint.className = "empty-hint";
        hint.textContent =
          "No posts yet — sign in and share something, or wait for the feed to update.";
        postGrid.appendChild(hint);
        return;
      }
      for (const p of posts) {
        const card = document.createElement("article");
        card.className = "post-card";
        card.dataset.id = String(p.id);
        card.innerHTML =
          "<h3></h3><div class='meta'></div>";
        card.querySelector("h3").textContent = p.title;
        card.querySelector(".meta").textContent =
          (p.username || "member") + " · " + fmtTime(p.created_at);
        card.addEventListener("click", () => openPost(p.id));
        postGrid.appendChild(card);
      }
    }

    function renderActivity(rows) {
      activityList.innerHTML = "";
      if (!rows || !rows.length) {
        const li = document.createElement("li");
        li.className = "activity-item";
        li.textContent = "Quiet for now.";
        activityList.appendChild(li);
        return;
      }
      for (const a of rows) {
        const li = document.createElement("li");
        li.className = "activity-item";
        const who = a.username || "system";
        li.innerHTML =
          "<div><span class='who'></span> <span class='msg'></span></div><time></time>";
        li.querySelector(".who").textContent = who + ":";
        li.querySelector(".msg").textContent = a.message;
        li.querySelector("time").textContent = fmtTime(a.created_at);
        activityList.appendChild(li);
      }
    }

    async function refreshGrid() {
      const data = await api("/api/v1/posts");
      renderPosts(data.posts || []);
    }

    async function refreshActivity() {
      const data = await api("/api/v1/activity?limit=40");
      renderActivity(data.activity || []);
    }

    async function tickPoll() {
      try {
        pollStatus.textContent = "Updating…";
        await Promise.all([refreshGrid(), refreshActivity()]);
        pollStatus.textContent = "Last sync " + new Date().toLocaleTimeString();
      } catch (e) {
        pollStatus.textContent = "Sync failed";
        console.warn(e);
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(tickPoll, POLL_MS);
    }

    async function openPost(id) {
      try {
        const data = await api("/api/v1/posts/" + id);
        const p = data.post;
        $("modal-title").textContent = p.title;
        $("modal-meta").textContent =
          (p.username || "member") + " · " + fmtTime(p.created_at);
        $("modal-body").textContent = p.body || "";
        modal.classList.add("open");
      } catch (e) {
        setFlash(e.message);
      }
    }

    function closeModal() {
      modal.classList.remove("open");
    }

    async function bootstrapSession() {
      try {
        const me = await api("/me");
        const u = me.user;
        guestAuth.hidden = true;
        userAuth.hidden = false;
        compose.hidden = false;
        $("user-label").textContent = u.username;
        $("vehicle-pill").textContent = u.vehicle
          ? u.vehicle.name
          : "No vehicle";
        $("btn-refresh").disabled = false;
        await refreshVehicles(u.vehicle ? u.vehicle.id : null);
        await tickPoll();
        startPolling();
      } catch (_) {
        guestAuth.hidden = false;
        userAuth.hidden = true;
        compose.hidden = true;
        $("btn-refresh").disabled = false;
        await refreshVehicles(null);
        await tickPoll();
        startPolling();
      }
    }

    $("btn-login").addEventListener("click", async () => {
      setFlash("");
      try {
        await api("/login", {
          method: "POST",
          body: JSON.stringify({
            username: $("login-username").value.trim(),
            password: $("login-password").value,
          }),
        });
        await bootstrapSession();
      } catch (e) {
        setFlash(e.message);
      }
    });

    $("btn-register").addEventListener("click", async () => {
      setFlash("");
      try {
        await api("/register", {
          method: "POST",
          body: JSON.stringify({
            username: $("reg-username").value.trim(),
            email: $("reg-email").value.trim(),
            password: $("reg-password").value,
          }),
        });
        await bootstrapSession();
      } catch (e) {
        setFlash(e.message);
      }
    });

    $("btn-logout").addEventListener("click", async () => {
      setFlash("");
      try {
        await api("/logout", { method: "POST", body: "{}" });
      } catch (_) {
        /* ignore */
      }
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
      guestAuth.hidden = false;
      userAuth.hidden = true;
      compose.hidden = true;
      vehicleSelect.disabled = true;
      $("btn-refresh").disabled = false;
      await tickPoll();
      startPolling();
    });

    vehicleSelect.addEventListener("change", async () => {
      const raw = vehicleSelect.value;
      const vehicle_id = raw === "" ? null : Number(raw);
      try {
        const data = await api("/me/vehicle", {
          method: "PUT",
          body: JSON.stringify({ vehicle_id }),
        });
        const v = data.user.vehicle;
        $("vehicle-pill").textContent = v ? v.name : "No vehicle";
        setFlash("");
        await refreshActivity();
      } catch (e) {
        setFlash(e.message);
      }
    });

    $("btn-refresh").addEventListener("click", () => tickPoll());

    $("btn-post").addEventListener("click", async () => {
      setFlash("");
      const title = $("post-title").value.trim();
      const body = $("post-body").value.trim();
      if (!title) {
        setFlash("Add a title for your post.");
        return;
      }
      try {
        await api("/api/v1/posts", {
          method: "POST",
          body: JSON.stringify({ title, body }),
        });
        $("post-title").value = "";
        $("post-body").value = "";
        await tickPoll();
      } catch (e) {
        setFlash(e.message);
      }
    });

    $("modal-close").addEventListener("click", closeModal);
    modal.addEventListener("click", (ev) => {
      if (ev.target === modal) closeModal();
    });

    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") closeModal();
    });

    bootstrapSession();
  })();
</script>
{% endblock %}
